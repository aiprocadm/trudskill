name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests_python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python_tests/requirements.txt
      - name: Install pytest
        run: pip install -r python_tests/requirements.txt
      - name: Run pytest
        run: python3 -m pytest

  lint_typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  tests_backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Backend unit/integration/migrations/security
        run: |
          pnpm test:backend
          pnpm test:integration
          pnpm test:migrations
          pnpm test:security

  tests_frontend_and_contracts:
    name: Frontend + Contract tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend and API contract checks
        run: |
          pnpm test:frontend
          pnpm test:contracts

  contract_drift_check:
    name: Contract drift check (required)
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify generated API contract artifacts are up-to-date
        run: pnpm --filter @trudskill/api-contracts contracts:check-generated

  frontend_typecheck_build:
    name: Frontend typecheck + build gate
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend typecheck
        run: pnpm --filter @trudskill/frontend typecheck
      - name: Build shared UI package (frontend dependency)
        run: pnpm --filter @trudskill/ui build
      - name: Frontend build
        run: pnpm --filter @trudskill/frontend build

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - tests_backend
      - tests_frontend_and_contracts
      - frontend_typecheck_build
      - contract_drift_check
      - tests_python
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages/apps
        run: pnpm build

  backend_image_smoke:
    name: Backend image smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t cdoprof-backend-smoke:${{ github.sha }} .
      - name: Run backend image and check live endpoint
        run: |
          docker run -d --rm --name backend-smoke \
            -p 3001:3001 \
            -e NODE_ENV=production \
            -e RELEASE_VERSION=ci-smoke \
            -e BACKEND_PORT=3001 \
            -e API_PREFIX=/api/v1 \
            -e DATABASE_URL=http://localhost:5432 \
            -e REDIS_URL=redis://localhost:6379 \
            -e RABBITMQ_URL=amqp://localhost:5672 \
            -e S3_ENDPOINT=http://localhost:9000 \
            -e S3_ACCESS_KEY=smoke-access \
            -e S3_SECRET_KEY=smoke-secret \
            -e S3_BUCKET=smoke-bucket \
            -e AUTH_JWT_SECRET=production-safe-secret-123 \
            -e SESSION_SECRET=production-safe-session-123 \
            -e ACCESS_TOKEN_TTL_SECONDS=900 \
            -e REFRESH_TOKEN_TTL_SECONDS=604800 \
            -e DB_MIGRATIONS_ENABLED=false \
            -e DB_MIGRATIONS_DIR=migrations \
            -e CORS_ORIGIN=http://localhost:3000 \
            -e PUBLIC_BASE_URL=http://localhost:3000 \
            -e REALTIME_PUBLIC_URL=http://localhost:3002 \
            -e REALTIME_PUBLISH_KEY=ci-smoke-realtime-publish-key \
            -e ALLOW_IN_MEMORY_STATE=false \
            -e INTEGRATION_WEBHOOK_SECRET=ci-smoke-webhook-secret \
            cdoprof-backend-smoke:${{ github.sha }}

          cleanup() {
            docker logs backend-smoke || true
            docker stop backend-smoke || true
          }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/api/v1/health/live > /tmp/backend-smoke.json; then
              cat /tmp/backend-smoke.json
              exit 0
            fi
            sleep 2
          done

          echo "Backend image did not become healthy in time."
          exit 1
