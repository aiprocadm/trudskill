name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  tests_backend:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Backend unit/integration/migrations/security
        run: |
          pnpm test:backend
          pnpm test:integration
          pnpm test:migrations
          pnpm test:security

  tests_frontend_and_contracts:
    name: Frontend + Contract tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Frontend and API contract checks
        run: |
          pnpm test:frontend
          pnpm test:contracts

  frontend_typecheck_build:
    name: Frontend typecheck + build gate
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Frontend typecheck
        run: pnpm --filter @cdoprof/frontend typecheck
      - name: Build shared UI package (frontend dependency)
        run: pnpm --filter @cdoprof/ui build
      - name: Frontend build
        run: pnpm --filter @cdoprof/frontend build

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - tests_backend
      - tests_frontend_and_contracts
      - frontend_typecheck_build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Build all packages/apps
        run: pnpm build
