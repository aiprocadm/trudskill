name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo 'pnpm-lock.yaml not found; running non-frozen install for bootstrap scenario'
            pnpm install --no-frozen-lockfile
          fi

      - name: Quality gates (lint, typecheck, unit tests, build)
        run: pnpm ci:check
