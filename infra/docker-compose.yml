services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cdoprof
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cdoprof']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb --ignore-existing local/cdoprof-dev
      "

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql:9.3
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/cdoprof
      API_KEYS: ${SUPERTOKENS_API_KEY:-change-me-supertokens-api-key}
      PASSWORD_HASHING_ALG: argon2
      ARGON2_ITERATIONS: '4'
      ARGON2_MEMORY_KB: '32768'
      ARGON2_PARALLELISM: '2'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3567:3567'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3567/hello']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      supertokens:
        condition: service_healthy
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  realtime:
    build:
      context: ..
      dockerfile: apps/realtime/Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '3002:3002'

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
