apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: pg-backup
              image: postgres:15
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-secret
                      key: password
              command:
                - /bin/sh
                - -c
                - pg_dump -h postgres -U postgres mydb | gzip > /backups/backup.sql.gz
          restartPolicy: OnFailure
